
# ─────────────────────────────────────────────────────────────
#  CASSITRACK — Local Development Infrastructure
#  University of Cassino and Southern Lazio — 2025/2026
#
#  Services:
#    postgres   → relational DB (routes, stops, users, schedules)
#    influxdb   → time-series DB (GPS telemetry from buses)
#    redis      → cache + session store
#    mosquitto  → MQTT broker (receives data from buses / ESP32)
#    cassitrack → Spring Boot backend API
#
#  Usage:
#    Start everything:        docker compose up -d
#    Start infra only:        docker compose up -d postgres influxdb redis mosquitto
#    View logs:               docker compose logs -f cassitrack
#    Stop everything:         docker compose down
#    Wipe all data (careful): docker compose down -v
#
#  ⚠️  SECURITY (V-05/V-09 fixes — OWASP A02/A05):
#    - All secrets are read from the .env file (never hardcoded here).
#    - All infrastructure ports are bound to 127.0.0.1 (localhost only).
#    - Generate strong secrets: openssl rand -base64 48
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + PostGIS ─────────────────────────────────────
  postgres:
    # A08 FIX: pinned by digest (not mutable tag) — tag kept in comment for readability
    image: postgis/postgis@sha256:44126d872ac91993766c341e369c539e8196614321765d36a6f1bab0419a5fa5  # 16-3.4
    container_name: cassitrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cassitrack
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"   # V-09: bound to localhost only
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d cassitrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── InfluxDB (time-series for GPS telemetry) ─────────────────
  influxdb:
    # A08 FIX: pinned by digest (not mutable tag) — tag kept in comment for readability
    image: influxdb@sha256:b8d940ca9376f85118260f5b6bd236b8a00b1749c3350c5578d4cde8e27f31f2  # 2.7
    container_name: cassitrack-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: cassitrack
      DOCKER_INFLUXDB_INIT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: unicas
      DOCKER_INFLUXDB_INIT_BUCKET: vehicle_telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    ports:
      - "127.0.0.1:8086:8086"   # V-09: bound to localhost only
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache + sessions) ──────────────────────────────────
  redis:
    # A08 FIX: pinned by digest (not mutable tag) — tag kept in comment for readability
    image: redis@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8  # 7.2-alpine
    container_name: cassitrack-redis
    restart: unless-stopped
    command: redis-server --requirepass ${SPRING_REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"   # V-09: bound to localhost only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SPRING_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Eclipse Mosquitto (MQTT broker) ──────────────────────────
  mosquitto:
    # A08 FIX: pinned by digest (not mutable tag) — tag kept in comment for readability
    image: eclipse-mosquitto@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c  # 2.0
    container_name: cassitrack-mosquitto
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"   # V-09: bound to localhost only (auth required — see V-02 fix)
    volumes:
      - ../mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ../mosquitto/config/passwd:/mosquitto/config/passwd
      - ../mosquitto/config/acl:/mosquitto/config/acl
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health -m ping -u ${MQTT_USERNAME} -P ${MQTT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── CASSITRACK Spring Boot Backend ───────────────────────────
  cassitrack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cassitrack-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cassitrack
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # InfluxDB
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: unicas
      INFLUX_BUCKET: vehicle_telemetry
      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD}
      # MQTT
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      # JWT — V-05 fix: secret loaded from .env, never hardcoded here
      JWT_SECRET: ${JWT_SECRET}
      # SSE API TOKEN
      SSE_API_TOKEN: ${SSE_API_TOKEN}
      # Weather
      WEATHER_API_KEY: ${WEATHER_API_KEY}
    ports:
      - "8080:8080"
    # NOTE: comment out the 'build' block and use 'image' below
    # if you want to run infra only and start Spring Boot from IntelliJ.
    profiles:
      - full  # only starts with: docker compose --profile full up

# ── Named volumes ─────────────────────────────────────────────
volumes:
  postgres_data:
  influxdb_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
