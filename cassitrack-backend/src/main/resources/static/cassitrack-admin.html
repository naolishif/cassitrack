<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CASSITRACK — Admin Panel</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="cassitrack-admin.css" rel="stylesheet">
</head>



<body>

<div class="modal-overlay" id="userModal">

    <div class="modal">

        <div class="modal-header">

            <h2 id="modalTitle">Add User</h2>

            <button class="close-btn" id="userModalCloseBtn">
                ✕
            </button>

        </div>

        <div class="modal-form">

            <input class="modal-input" id="modalTaxId" placeholder="Tax ID"/>

            <input class="modal-input" id="modalName" placeholder="Name"/>

            <input class="modal-input" id="modalSurname" placeholder="Surname"/>

            <input class="modal-input" id="modalEmail" placeholder="Email"/>

            <input class="modal-input" id="modalTelephone" placeholder="Telephone"/>

            <input class="modal-input" id="modalPassword" type="password" placeholder="Password"/>

            <select class="modal-input" id="modalRole">

                <option value="ADMIN">ADMIN</option>
                <option value="FLEET_MANAGER">FLEET_MANAGER</option>
                <option value="DRIVER">DRIVER</option>

            </select>

            <div id="formMessage" class="form-message"></div>

            <button class="btn btn-primary" id="saveUserBtn">
                Save User
            </button>

        </div>

    </div>

</div>

<!-- DELETE MODAL -->

<div class="modal-overlay" id="deleteModal">

    <div class="modal modal-delete">

        <div class="modal-header">

            <h2>Delete User</h2>

            <button class="close-btn" id="deleteModalCloseBtn">
                ✕
            </button>

        </div>

        <div class="delete-confirm-text">

            Are you sure you want to delete this user?

        </div>

        <div class="modal-actions-right">

            <button
                    class="btn btn-secondary"
                    id="deleteCancelBtn">
                Cancel
            </button>

            <button
                    class="btn btn-danger"
                    id="confirmDeleteBtn">
                Delete
            </button>

        </div>

    </div>

</div>

<div class="app">

    <header>

        <div class="logo">
            CASSI<span>TRACK</span>
        </div>

        <div class="header-actions">

            <div class="admin-badge">
                ADMIN PANEL
            </div>

            <button class="btn btn-secondary" id="logoutBtn">
                Log Out
            </button>

        </div>

    </header>

    <div class="content">

        <div class="panel">

            <div class="topbar">

                <div class="search-box">

                    <input
                            type="text"
                            class="search-input"
                            placeholder="Search by name, surname, email, phone or tax ID..."
                            id="searchInput"
                    />

                </div>

                <div class="actions">

                    <button
                            class="btn btn-secondary"
                            id="editBtn"
                            disabled>
                        Edit User
                    </button>

                    <button
                            class="btn btn-secondary"
                            id="deleteBtn"
                            disabled>
                        Delete User
                    </button>

                    <button class="btn btn-primary" id="addUserBtn">
                        + Add User
                    </button>

                </div>

            </div>

            <div class="table-wrapper">

                <table>

                    <thead>

                    <tr>
                        <th>ID</th>
                        <th>TAX ID</th>
                        <th>NAME</th>
                        <th>SURNAME</th>
                        <th>EMAIL</th>
                        <th>TELEPHONE</th>
                        <th>ROLE</th>
                    </tr>

                    </thead>

                    <tbody id="usersTable"></tbody>

                </table>

            </div>


        </div>

    </div>

</div>

<script src="cassitrack-admin.js"></script>

</body>
</html>
