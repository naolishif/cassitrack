spring:
  application:
    name: cassitrack

# -── Web / Static Resources ───────────────────────────────────────
  web:
    resources:
      static-locations:
        - classpath:/static/
        - classpath:/public/

  # ── PostgreSQL ────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cassitrack}
    username: ${SPRING_DATASOURCE_USERNAME:cassitrack}
    password: ${SPRING_DATASOURCE_PASSWORD:cassitrack_dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway (DB schema migrations) ────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ─────────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:cassitrack_dev}

  # ── WebSocket ─────────────────────────────────────────────────
  websocket:
    stomp:
      endpoint: /ws/vehicles

# ── Server ───────────────────────────────────────────────────────
server:
  port: 8080
  #servlet:
  #  context-path: /

# ── InfluxDB ──────────────────────────────────────────────────────
influx:
  url: ${INFLUX_URL:http://localhost:8086}
  token: ${INFLUX_TOKEN:cassitrack-dev-token-change-in-production}
  org: ${INFLUX_ORG:unicas}
  bucket: ${INFLUX_BUCKET:vehicle_telemetry}

# ── MQTT Broker ───────────────────────────────────────────────────
mqtt:
  broker:
    url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: cassitrack-backend
  topics:
    position: cassitrack/+/position    # + is a wildcard matching any vehicle_id
    ble: cassitrack/+/ble

# ── JWT ───────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:cassitrack-jwt-secret-change-in-production-must-be-long}
  expiration-ms: 86400000    # 24 hours

# ── OpenAPI / Swagger UI ──────────────────────────────────────────
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui
    operationsSorter: method
  info:
    title: CASSITRACK API
    description: Real-time bus fleet monitoring — Cassino MAGNI Autoservizi
    version: v1

# ── Logging ───────────────────────────────────────────────────────
logging:
  level:
    it.unicas.cassitrack: DEBUG
    org.springframework.integration.mqtt: INFO
    org.hibernate.SQL: WARN
    org:
      springframework:
        security: DEBUG

# ── Anthropic Claude API ──────────────────────────────────────
anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:no-key-set}
    url: https://api.anthropic.com/v1/messages
    model: ${ANTHROPIC_API_MODEL:claude-sonnet-4-20250514  # claude-haiku-4-5-20251001} #claude-3-5-haiku-latest
    version: ${ANTHROPIC_API_VERSION:2023-06-01}

# ── Weather Service (OpenWeatherMap) ─────────────────────────
# Get free key at: https://openweathermap.org/api
# Set as env variable WEATHER_API_KEY in IntelliJ
# If not configured, defaults to CLEAR weather (safe fallback)
weather:
  api:
    key: ${WEATHER_API_KEY:a50cdb6508e8300b5af885e88e9dcb3a}
    url: https://api.openweathermap.org/data/2.5/weather
    city: Cassino
    country: IT
