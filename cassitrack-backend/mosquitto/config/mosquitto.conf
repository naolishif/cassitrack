listener 1883
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# ── Authentication ────────────────────────────────────────────────────────────
# V-02 FIX (OWASP A05): Anonymous connections DISABLED.
# All clients must present valid credentials — anonymous GPS injection is now blocked.
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ── Setup: create credentials inside the running container ────────────────────
#   docker exec -it cassitrack-mosquitto mosquitto_passwd -c /mosquitto/config/passwd cassitrack-backend
#   docker exec -it cassitrack-mosquitto mosquitto_passwd    /mosquitto/config/passwd cassitrack-bus
# Then set in cassitrack-backend/.env:
#   MQTT_USERNAME=cassitrack-backend  MQTT_PASSWORD=<generated>
# And in the GPS simulator env:
#   MQTT_USERNAME=cassitrack-bus      MQTT_PASSWORD=<generated>
# And in ESP32 firmware: mqtt_user / mqtt_pass
# Restart broker: docker compose restart mosquitto
