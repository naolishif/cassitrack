listener 1883
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# ── Authentication ────────────────────────────────────────────────────────────
# LOCAL DEV: anonymous connections allowed (simulator runs without credentials)
allow_anonymous true

# PRODUCTION / ESP32 DEPLOYMENT: comment out the line above and uncomment below.
# Steps to enable:
#   1. Create broker credentials inside the running container:
#        docker exec -it cassitrack-mosquitto mosquitto_passwd -c /mosquitto/config/passwd cassitrack-backend
#        docker exec -it cassitrack-mosquitto mosquitto_passwd    /mosquitto/config/passwd cassitrack-bus
#   2. Propagate the credentials:
#        - cassitrack-backend/.env  → set MQTT_USERNAME=cassitrack-backend, MQTT_PASSWORD=<pass>
#        - simulator               → set MQTT_USERNAME=cassitrack-bus,     MQTT_PASSWORD=<pass>
#        - ESP32 firmware          → set mqtt_user / mqtt_pass in the sketch before flashing
#   3. Uncomment the three lines below and restart the broker (docker compose restart mosquitto).
#
# allow_anonymous false
# password_file /mosquitto/config/passwd
# acl_file /mosquitto/config/acl
