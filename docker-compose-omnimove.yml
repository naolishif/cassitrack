# ─────────────────────────────────────────────────────────────
#  OMNIMOVE — Docker Stack
#  University of Cassino and Southern Lazio — 2025/2026
#
#  Included services:
#    postgres   → Relational database (user accounts, preferences,
#                 analytics aggregates — separate DB from CASSITRACK)
#    redis      → Cache (recent bus positions, JWT sessions,
#                 rate limiting)
#    omnimove   → Spring Boot backend (port 8081)
#
#  NOTE: During the initial development phase, OMNIMOVE's
#        application.yml uses an in-memory H2 database instead
#        of PostgreSQL.
#        This compose file already prepares the real PostgreSQL
#        setup for future migration (SHOULD-level, July milestone).
#        For now, you can run only the dev profile (see below).
#
#  Internal network: omnimove-net 
#  Ports exposed to the host:
#    5433  → OMNIMOVE PostgreSQL 
#    6380  → OMNIMOVE Redis       
#    8081  → OMNIMOVE API
#
#  Useful commands:
#    Start DB only (development with IntelliJ):
#      docker compose up -d postgres redis
#
#    Start everything (containerized API):
#      docker compose --profile full up -d
#
#    Backend logs:
#      docker compose logs -f omnimove
#
#    Stop everything:
#      docker compose down
#
#    Full reset (delete data):
#      docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL OMNIMOVE ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnimove-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: omnimove
      POSTGRES_USER: omnimove
      POSTGRES_PASSWORD: omnimove_dev
    ports:
      - "5433:5432"   # porta HOST 5433 → porta CONTAINER 5432
    volumes:
      - omnimove_postgres_data:/var/lib/postgresql/data
    networks:
      - omnimove-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnimove -d omnimove"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis OMNIMOVE ────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: omnimove-redis
    restart: unless-stopped
    command: redis-server --requirepass omnimove_dev
    ports:
      - "6380:6379"   # porta HOST 6380 → porta CONTAINER 6379
    volumes:
      - omnimove_redis_data:/data
    networks:
      - omnimove-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "omnimove_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OMNIMOVE Spring Boot Backend ─────────────────────────────
  omnimove:
    build:
      context: ./omnimove-backend
      dockerfile: Dockerfile
    container_name: omnimove-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/omnimove
      SPRING_DATASOURCE_USERNAME: omnimove
      SPRING_DATASOURCE_PASSWORD: omnimove_dev
      # Redis
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: omnimove_dev
      # JWT
      JWT_SECRET: omnimove-jwt-secret-change-in-production-must-be-long
      # URL di CASSITRACK 
      CASSITRACK_URL: http://host.docker.internal:8080/api/v1
      # API external
      # ANTHROPIC_API_KEY: <inserire_chiave>
      # WEATHER_API_KEY: <inserire_chiave>
    ports:
      - "8081:8081"
    networks:
      - omnimove-net
    profiles:
      - full   # avvia SOLO con: docker compose --profile full up -d

# ── internal network OMNIMOVE ─────────────────────────────────────
networks:
  omnimove-net:
    name: omnimove-net
    driver: bridge


# ── Volume ─────────────────────────────────────────────────────────
volumes:
  omnimove_postgres_data:
  omnimove_redis_data:
