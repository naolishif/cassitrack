# ── OMNIMOVE Server ───────────────────────────────────────────
# Multimodal Journey Planner — port 8081
# Communicates with CASSITRACK (port 8080) via REST API ONLY

spring:
  application:
    name: omnimove
  datasource:
    url: jdbc:postgresql://localhost:5432/omnimovedb
    driver-class-name: org.postgresql.Driver
    username: omnimove
    password: omnimove
  sql:
    init:
      mode: never
      data-locations: classpath:database/V2__init_data.sql
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
        host: localhost
        port: 6380
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

# ── CASSITRACK API Connection ─────────────────────────────────
# OMNIMOVE calls CASSITRACK for live bus data
cassitrack:
  api:
    base-url: ${CASSITRACK_URL:http://localhost:8080/api/v1}
    token: ${CASSITRACK_API_TOKEN:dev-only-insecure-token}

# ── Anthropic Claude API ──────────────────────────────────────
anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:${ANTHROPIC_API_KEY}
    url: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-20250514    # claude-haiku-4-5-20251001

# ── Weather Service ───────────────────────────────────────────
weather:
  api:
    key: ${WEATHER_API_KEY:a50cdb6508e8300b5af885e88e9dcb3a}
    url: https://api.openweathermap.org/data/2.5/weather
    city: Cassino
    country: IT

# ── Elerent Shared Mobility Pricing ──────────────────────────
elerent:
  bike:
    unlock: 0.50
    per-minute: 0.15
  scooter:
    unlock: 1.00
    per-minute: 0.25

# ── OpenAPI ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    it.unicas.omnimove: DEBUG

# ── H2 Embedded Database (for user management) ────────────────
# No Docker needed — H2 is embedded in the JAR

# ── JWT ───────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:omnimove-jwt-secret-change-in-production-must-be-long}
  expiration-ms: 86400000

# ── InfluxDB Omnimove ─────────────────────────────────────────────
influx:
  url: ${INFLUX_URL:http://localhost:8087}
  # Paste here your InfluxDB generated token:
  token: ${INFLUX_TOKEN:N6uXRH7MpS-PQfePmPwkiEHvLeRLQK95f_arx-tVysM3RjSgWyZ645pVL3MhoKUyqSyqDEIH3ok_mgPiA3IXJw==}
  org: omnimove_org
  bucket: omnimove_bucket

# ── Google Maps API ───────────────────────────────────────────
# Richiede: Distance Matrix API abilitata su Google Cloud Console
# Set as env variable GOOGLE_MAPS_API_KEY in IntelliJ
# Se non configurata, il sistema cade in fallback haversine

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
