# ── OMNIMOVE Server ───────────────────────────────────────────
# Multimodal Journey Planner — port 8081
# Communicates with CASSITRACK (port 8080) via REST API ONLY

spring:
  application:
    name: omnimove
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/omnimovedb}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:omnimove}
    password: ${SPRING_DATASOURCE_PASSWORD}
  sql:
    init:
      mode: never
      data-locations: classpath:database/V2__init_data.sql
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
        host: localhost
        port: 6380
  h2:
    console:
      enabled: false

  # ── Mail (Gmail SMTP) ──────────────────────────────────────
  # Setup: myaccount.google.com/apppasswords → genera App Password de 16 letras
  # IntelliJ Run Config → Environment variables:
  #   MAIL_USERNAME=tucuenta@gmail.com
  #   MAIL_PASSWORD=abcdefghijklmnop   (sin espacios)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:omnimove.noreply.demo@gmail.com}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

server:
  port: 8081

# ── CASSITRACK API Connection ─────────────────────────────────
# OMNIMOVE calls CASSITRACK for live bus data
cassitrack:
  api:
    base-url: ${CASSITRACK_URL:http://localhost:8080/api/v1}
    token: ${CASSITRACK_API_TOKEN}
  netex:
    url: ${CASSITRACK_NETEX_URL:http://localhost:8080/api/static/netex}

# ── Anthropic Claude API ──────────────────────────────────────
anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
    url: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-20250514    # claude-haiku-4-5-20251001

# ── Weather Service ───────────────────────────────────────────
weather:
  api:
    key: ${WEATHER_API_KEY:}
    url: https://api.openweathermap.org/data/2.5/weather
    city: Cassino
    country: IT

# ── Elerent Shared Mobility Pricing ──────────────────────────
elerent:
  bike:
    unlock: 0.50
    per-minute: 0.15
  scooter:
    unlock: 1.00
    per-minute: 0.25

# ── OpenAPI ───────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui

# ── Logging ───────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    it.unicas.omnimove: INFO
    SECURITY_AUDIT: INFO

# ── H2 Embedded Database (for user management) ────────────────
# No Docker needed — H2 is embedded in the JAR

# ── JWT ───────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000    # 1 hour

# ── InfluxDB Omnimove ─────────────────────────────────────────────
influx:
  url: ${INFLUX_URL:http://localhost:8087}
  # Paste here your InfluxDB generated token:
  token: ${INFLUX_TOKEN}
  org: omnimove_org
  bucket: omnimove_bucket

# ── Google Maps API ───────────────────────────────────────────
# Richiede: Distance Matrix API abilitata su Google Cloud Console
# Set as env variable GOOGLE_MAPS_API_KEY in IntelliJ
# Se non configurata, il sistema cade in fallback haversine

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:#AIzaSyAIcS5KU5svVtHFC6KzMHGkgc37dHm9HBU}

# ── OMNIMOVE App Config ───────────────────────────────────────
omnimove:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:3000}
  mail:
    from: "OMNIMOVE <${MAIL_USERNAME:omnimove.noreply@gmail.com}>"
    base-url: ${APP_BASE_URL:http://localhost:8081}
