<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OMNIMOVE — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="reset-password.css" rel="stylesheet"/>
</head>
<body>
  <div class="box">
    <div class="logo">OMNI<span>MOVE</span></div>
    <div class="tag">Smart mobility for Cassino — UNICAS 2025/2026</div>
    <div class="card">
      <div>
        <div class="title">Reset your password</div>
        <div class="sub">Choose a new password for your account.</div>
      </div>
      <div id="msgBox"></div>
      <form id="resetForm" onsubmit="doReset(event)">
        <div class="field">
          <label>New Password</label>
          <input id="p1" type="password" placeholder="Min 8 characters"/>
          <span class="ferr" id="e1"></span>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input id="p2" type="password" placeholder="Repeat password"/>
          <span class="ferr" id="e2"></span>
        </div>
        <button type="submit" id="btn">Set New Password</button>
      </form>
    </div>
  </div>

  <script src="reset-password.js"></script>
</body>
</html>
