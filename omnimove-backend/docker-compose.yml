services:
  # 1. Database Relazionale (Postgres)
  omnimove-postgres:
    # A08 FIX: pinned by digest (not mutable tag) — tag kept in comment for readability
    image: postgres@sha256:cd17e2ac98240fce1541ad2a803b34009b4eea5aec8a832363cdc7eca62e722e  # 15-alpine
    container_name: omnimove-postgres-container
    ports:
      - "127.0.0.1:5432:5432"   # V-09: localhost only
    environment:
      POSTGRES_DB: omnimovedb
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - omnimove_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d omnimovedb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Database Temporale (InfluxDB)
  omnimove-influxdb:
    # A08 FIX: pinned by digest (not mutable tag) — tag kept in comment for readability
    image: influxdb@sha256:991673dc2d237bd79b15d6627410d72de111387e7dac673dbb92cf3333ffcc8c  # 2.7-alpine
    container_name: omnimove-influxdb-container
    ports:
      - "127.0.0.1:8087:8086"   # V-09: localhost only
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=omnimove_admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=omnimove_org
      - DOCKER_INFLUXDB_INIT_BUCKET=omnimove_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - omnimove_influxdb_data:/var/lib/influxdb2

  # 3. Cache / NoSQL (Redis)
  omnimove-redis:
    # A08 FIX: pinned by digest (not mutable tag) — tag kept in comment for readability
    image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99  # 7-alpine
    container_name: omnimove-redis-container
    # V-08 fix (OWASP A05): Redis requires a password loaded from .env SPRING_REDIS_PASSWORD
    command: redis-server --requirepass ${SPRING_REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"   # V-09: localhost only
    volumes:
      - omnimove_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SPRING_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. OMNIMOVE Spring Boot Backend
  omnimove:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnimove-api
    restart: unless-stopped
    depends_on:
      omnimove-postgres:
        condition: service_healthy
      omnimove-redis:
        condition: service_healthy
    environment:
      # Database
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # InfluxDB
      INFLUX_URL: http://omnimove-influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      # Redis
      SPRING_DATA_REDIS_HOST: omnimove-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Mail
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # Cassitrack connection
      CASSITRACK_URL: ${CASSITRACK_URL}
      CASSITRACK_API_TOKEN: ${CASSITRACK_API_TOKEN}
      CASSITRACK_NETEX_URL: ${CASSITRACK_NETEX_URL}

      # External APIs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      APP_BASE_URL: ${APP_BASE_URL}
      # Context path — must match the Nginx location prefix
      SERVER_SERVLET_CONTEXT_PATH: ${SERVER_SERVLET_CONTEXT_PATH:-/omnimove}
    ports:
      - "127.0.0.1:8180:8180"
    profiles:
      - full  # only starts with: docker compose --profile full up

volumes:
  omnimove_postgres_data:
  omnimove_influxdb_data:
  omnimove_redis_data:
